<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="#080808"/>
  <!-- Pixel-art J — 5×7 grid at 4px/cell, centered (x+6, y+2) -->
  <!-- Row 0: .#### -->
  <rect x="10" y="2"  width="4" height="4" fill="#00ff41"/>
  <rect x="14" y="2"  width="4" height="4" fill="#00ff41"/>
  <rect x="18" y="2"  width="4" height="4" fill="#00ff41"/>
  <rect x="22" y="2"  width="4" height="4" fill="#00ff41"/>
  <!-- Row 1: ....# -->
  <rect x="22" y="6"  width="4" height="4" fill="#00ff41"/>
  <!-- Row 2: ....# -->
  <rect x="22" y="10" width="4" height="4" fill="#00ff41"/>
  <!-- Row 3: ....# -->
  <rect x="22" y="14" width="4" height="4" fill="#00ff41"/>
  <!-- Row 4: #...# -->
  <rect x="6"  y="18" width="4" height="4" fill="#00ff41"/>
  <rect x="22" y="18" width="4" height="4" fill="#00ff41"/>
  <!-- Row 5: #...# -->
  <rect x="6"  y="22" width="4" height="4" fill="#00ff41"/>
  <rect x="22" y="22" width="4" height="4" fill="#00ff41"/>
  <!-- Row 6: .###. -->
  <rect x="10" y="26" width="4" height="4" fill="#00ff41"/>
  <rect x="14" y="26" width="4" height="4" fill="#00ff41"/>
  <rect x="18" y="26" width="4" height="4" fill="#00ff41"/>
</svg>
