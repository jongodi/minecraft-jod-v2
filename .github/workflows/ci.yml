name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        run: npm run build
        env:
          # Build-time env stubs so Next.js doesn't fail on missing vars
          EXAROTON_API_KEY:       stub
          ADMIN_TOKEN:            stubstub
          REDIS_URL:              redis://localhost:6379
          BLOB_READ_WRITE_TOKEN:  stub
